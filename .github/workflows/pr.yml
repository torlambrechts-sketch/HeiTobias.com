name: PR — lint + typecheck + tests
on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heitobias_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: [5432:5432]

    env:
      NODE_ENV: test
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/heitobias_test
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

      - name: Invariant checks (RLS + audit + science discipline)
        run: node scripts/invariant-checks.mjs
